<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOVA — Content Studio</title>
<style>
  :root{
    --bg:#0a0b10; --panel:#13151d; --panel2:#1a1d27; --line:#252a36;
    --txt:#e9ecf3; --muted:#8a92a6; --accent:#7c5cff; --accent2:#19c3ff;
    --ok:#36d39a; --warn:#ffb454; --err:#ff5d6c; --chip:#222837; --radius:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1100px 560px at 85% -12%,#1d1740 0%,var(--bg) 55%);color:var(--txt);min-height:100vh}
  a{color:var(--accent2)}
  .app{display:grid;grid-template-columns:252px 1fr;min-height:100vh}
  .side{background:linear-gradient(180deg,#15131f,#101119);border-right:1px solid var(--line);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{display:flex;align-items:center;gap:11px;margin:4px 6px 4px;font-weight:800;font-size:19px;letter-spacing:.5px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:18px;box-shadow:0 6px 20px -6px var(--accent)}
  .brand small{display:block;font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .navlabel{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 8px 6px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:9px 10px;border-radius:11px;cursor:pointer;font-size:13.5px}
  .nav button:hover{background:var(--panel2);color:var(--txt)}
  .nav button.active{background:linear-gradient(90deg,rgba(124,92,255,.22),rgba(25,195,255,.08));color:#fff}
  .nav button .ic{width:20px;text-align:center;font-size:15px}
  .nav button .badge{margin-left:auto;font-size:10px;background:var(--chip);color:var(--muted);padding:2px 7px;border-radius:20px}
  .status{margin:16px 6px 0;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--err)} .dot.on{background:var(--ok)}
  .main{padding:26px 32px 64px;max-width:1160px}
  .head{margin-bottom:14px} .head h1{margin:0 0 4px;font-size:24px} .head p{margin:0;color:var(--muted);font-size:14px;max-width:760px}
  .workflow{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 20px}
  .step{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);padding:8px 12px;border-radius:30px;font-size:12.5px;color:var(--muted)}
  .step b{color:var(--txt);font-weight:600}
  .step .n{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
  @media(max-width:900px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .card h3{margin:0 0 14px;font-size:15px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;margin-bottom:6px;color:var(--txt)}
  .field .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
  .req{color:var(--err)}
  input[type=text],input[type=number],textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
  textarea{min-height:84px;resize:vertical;line-height:1.5}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:12px}.row>*{flex:1}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:7px 13px;border-radius:9px;cursor:pointer;font-size:13px}
  .seg button.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tabs button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:9px 16px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600}
  .tabs button.sel{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
  .uprow{display:flex;gap:8px}.uprow input{flex:1}.upbtn{white-space:nowrap}
  .toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--muted)}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .thumb{position:relative;width:60px;height:60px;border-radius:9px;overflow:hidden;border:1px solid var(--line);background:#000}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
  .thumb .x{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;width:18px;height:18px}
  .picker{display:flex;flex-direction:column;gap:6px;max-height:150px;overflow:auto}
  .pick{display:flex;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;cursor:pointer}
  .pick.sel{border-color:var(--accent)} .pick .id{margin-left:auto;font-size:10.5px;color:var(--muted);font-family:ui-monospace,monospace}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed} .btn.ghost{background:var(--panel2);border:1px solid var(--line)}
  .out{min-height:120px;display:grid;place-items:center;text-align:center;color:var(--muted);font-size:13px}
  .out video,.out img{max-width:100%;border-radius:10px}.out audio{width:100%}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;padding:4px 10px;border-radius:20px;background:var(--chip);color:var(--muted)}
  .pill.run{color:var(--warn)} .pill.ok{color:var(--ok)} .pill.err{color:var(--err)}
  .price{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;word-break:break-word}
  .modeldesc{font-size:12.5px;color:var(--muted);margin:8px 0 4px;line-height:1.5}
  .platforms{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
  .plat{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px;cursor:pointer;text-align:center;font-size:12.5px}
  .plat.sel{border-color:var(--accent);background:linear-gradient(135deg,rgba(124,92,255,.18),rgba(25,195,255,.08))}
  .plat .e{font-size:19px;display:block;margin-bottom:3px} .plat small{color:var(--muted);display:block;font-size:10.5px}
  .libitem{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px}
  .libitem img{width:40px;height:40px;border-radius:8px;object-fit:cover}
  .libitem .meta{min-width:0}.libitem .meta b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .libitem .meta small{color:var(--muted);font-family:ui-monospace,monospace;font-size:10.5px}
  .libitem .copy{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);border-radius:7px;cursor:pointer;padding:5px 9px;font-size:11px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:11px 18px;border-radius:11px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}.toast.err{border-color:var(--err)}.toast.ok{border-color:var(--ok)}
  .note{background:rgba(124,92,255,.08);border:1px solid rgba(124,92,255,.3);color:#cfc4ff;font-size:12.5px;padding:11px 13px;border-radius:10px;margin-bottom:16px}
  code{background:var(--panel2);padding:2px 6px;border-radius:6px;font-size:12px}
  .hist .h{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px}
  .hist .h:last-child{border:none}.hist .h .t{color:var(--muted);margin-left:auto;font-size:11px}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="logo" id="brandMark">✦</span><span id="brandName">NOVA<small id="brandSub">Content Studio</small></span></div>
    <div class="navlabel">Create</div><nav class="nav" id="navCreate"></nav>
    <div class="navlabel">Power</div><nav class="nav" id="navPower"></nav>
    <div class="navlabel">Assets</div><nav class="nav" id="navAssets"></nav>
    <div class="navlabel">System</div><nav class="nav" id="navSys"></nav>
    <div class="status"><span class="dot" id="connDot"></span><span id="connTxt">Not connected</span></div>
  </aside>
  <main class="main" id="view"></main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===== BRAND — change these 3 lines to rename your product ===== */
const BRAND={name:'NOVA', sub:'Content Studio', mark:'✦'};

/* ===== storage ===== */
const LS={
  get key(){return localStorage.getItem('nova_key')||''}, set key(v){localStorage.setItem('nova_key',v)},
  get base(){return localStorage.getItem('nova_base')||'https://api.muapi.ai/api/v1'}, set base(v){localStorage.setItem('nova_base',v)},
  get lib(){try{return JSON.parse(localStorage.getItem('nova_lib')||'{"voices":[],"characters":[]}')}catch(e){return{voices:[],characters:[]}}}, set lib(v){localStorage.setItem('nova_lib',JSON.stringify(v))},
  get hist(){try{return JSON.parse(localStorage.getItem('nova_hist')||'[]')}catch(e){return[]}}, set hist(v){localStorage.setItem('nova_hist',JSON.stringify(v.slice(0,60)))}
};
const VOICES=["achernar","achird","algenib","algieba","alnilam","aoede","autonoe","callirrhoe","charon","despina","enceladus","erinome","fenrir","gacrux","iapetus","korel","aomedeia","leda","orus","puck","pulcherrima","rasalgethi","sadachbia","sadaltager","schedar","sulafat","umbriel","vindemiatrix","zephyr","zubenelgenubi"];
const PLATFORMS={
  tiktok:{e:'🎵',label:'TikTok',ar:'9:16',dur:8,kind:'video'},
  reels:{e:'📸',label:'Reels',ar:'9:16',dur:8,kind:'video'},
  shorts:{e:'▶️',label:'YT Shorts',ar:'9:16',dur:8,kind:'video'},
  igpost:{e:'🟪',label:'IG Post',ar:'1:1',dur:0,kind:'image'},
  youtube:{e:'🎬',label:'YouTube',ar:'16:9',dur:8,kind:'video'},
  x:{e:'✖️',label:'X / Twitter',ar:'16:9',dur:6,kind:'video'}
};

let MODELS=[], MODELS_BY_CAT={};

/* ===== nav config (outcome-oriented; engine hidden) ===== */
const NAV={
  create:[
    ['video','🎬','Make Video'],
    ['edit','✂️','Edit Video'],
    ['avatars','🧑‍🎤','Avatars'],
    ['talking','🗣️','Talking Avatar'],
    ['social','📣','Social Content'],
    ['images','🎨','Images'],
    ['audio','🎵','Audio & Music'],
  ],
  power:[['allmodels','🧩','All Engines']],
  assets:[['library','📚','Library'],['history','🕘','History']],
  sys:[['settings','⚙️','Settings']]
};

/* ===== helpers ===== */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,a={},...c)=>{const e=document.createElement(t);for(const k in a){if(k==='class')e.className=a[k];else if(k==='html')e.innerHTML=a[k];else if(k.startsWith('on'))e.addEventListener(k.slice(2),a[k]);else e.setAttribute(k,a[k])}c.flat().forEach(x=>x!=null&&e.append(x.nodeType?x:document.createTextNode(x)));return e};
function toast(m,t=''){const e=$('#toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',2600);}
function headers(){return{'x-api-key':LS.key,'Content-Type':'application/json'};}
function pretty(s){return s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
let F={};

/* ===== engine API ===== */
async function apiUpload(file){const fd=new FormData();fd.append('file',file);const r=await fetch(`${LS.base}/upload_file`,{method:'POST',headers:{'x-api-key':LS.key},body:fd});const j=await r.json().catch(()=>({}));if(!j.url)throw new Error(j.error||j.detail||'Upload failed');return j.url;}
async function apiSubmit(ep,p){const r=await fetch(`${LS.base}/${ep}`,{method:'POST',headers:headers(),body:JSON.stringify(p)});const j=await r.json().catch(()=>({}));if(j.error||j.detail)throw new Error(j.error||j.detail);return j;}
async function apiResult(id){const r=await fetch(`${LS.base}/predictions/${id}/result`,{headers:headers()});return r.json();}
async function poll(id,tick){for(let i=0;i<200;i++){await new Promise(r=>setTimeout(r,4000));const j=await apiResult(id);tick&&tick(j.status||'processing');if(j.status==='completed')return j;if(j.status==='failed')throw new Error((j.output&&j.output.error)||j.error||'failed');}throw new Error('Timed out — re-poll from History');}

/* ===== field renderers ===== */
function wrap(label,node,hint,req){const f=el('div',{class:'field'});if(label){const l=el('label',{},label);if(req)l.append(el('span',{class:'req'},' *'));f.append(l);}f.append(node);if(hint)f.append(el('div',{class:'hint',html:hint}));return f;}
function fSeg(label,key,opts,def,hint){F[key]=def;const seg=el('div',{class:'seg'});opts.forEach(o=>{const b=el('button',{class:o===def?'sel':'',onclick:()=>{F[key]=o;[...seg.children].forEach(c=>c.classList.toggle('sel',c.textContent===String(o)));}},String(o));seg.append(b);});return wrap(label,seg,hint,false);}
function fText(label,key,ph,req,area){const n=area?el('textarea',{placeholder:ph||''}):el('input',{type:'text',placeholder:ph||''});n.addEventListener('input',()=>F[key]=n.value);F[key]='';return wrap(label,n,null,req);}
function fSelect(label,key,opts,req){const s=el('select');s.append(el('option',{value:''},'— choose —'));opts.forEach(o=>s.append(el('option',{value:o},o)));s.addEventListener('change',()=>F[key]=s.value);return wrap(label,s,null,req);}
function fFiles(label,key,multi,hint,accept){F[key]=[];const drop=el('div',{class:'seg'});const btn=el('button',{},multi?'+ add files':'choose file');const thumbs=el('div',{class:'thumbs'});const input=el('input',{type:'file',accept:accept||'image/*',style:'display:none',...(multi?{multiple:'multiple'}:{})});
  const add=fl=>{for(const f of fl){if(!multi){F[key]=[];thumbs.innerHTML='';}F[key].push({file:f});const url=URL.createObjectURL(f);const isV=f.type.startsWith('video');const t=el('div',{class:'thumb'},isV?el('video',{src:url,muted:'1'}):el('img',{src:url}));const rec=F[key][F[key].length-1];t.append(el('button',{class:'x',onclick:()=>{F[key]=F[key].filter(r=>r!==rec);t.remove();}},'×'));thumbs.append(t);if(!multi)break;}};
  btn.onclick=e=>{e.preventDefault();input.click();};input.onchange=()=>add(input.files);drop.append(btn);return wrap(label,el('div',{},drop,input,thumbs),hint,!hint&&!multi);}
function fUrl(label,key,accept,req,hint){F[key]='';const inp=el('input',{type:'text',placeholder:'paste URL or upload →'});inp.oninput=()=>F[key]=inp.value;const file=el('input',{type:'file',accept:accept||'image/*',style:'display:none'});const up=el('button',{class:'upbtn',onclick:async e=>{e.preventDefault();if(!LS.key)return toast('Connect in Settings first','err');file.click();}},'⬆ upload');file.onchange=async()=>{try{up.textContent='…';const u=await apiUpload(file.files[0]);inp.value=u;F[key]=u;up.textContent='✓';toast('Uploaded','ok');}catch(e){up.textContent='⬆ upload';toast(e.message,'err');}};return wrap(label,el('div',{class:'uprow'},inp,el('div',{class:'seg'},up),file),hint,req);}

/* ===== nav / routing ===== */
let CURRENT='video';
function go(id){CURRENT=id;window.scrollTo(0,0);renderNav();const v=$('#view');v.innerHTML='';
  ({video:viewVideo,edit:viewEdit,avatars:viewAvatars,talking:viewTalking,social:viewSocial,images:viewImages,audio:viewAudio,allmodels:viewAll,library:viewLibrary,history:viewHistory,settings:viewSettings}[id]||viewVideo)(v);}
function navGroup(elm,items){elm.innerHTML='';items.forEach(([id,ic,label])=>{let badge='';if(id==='library'){const l=LS.lib;badge=String((l.voices.length+l.characters.length)||'');}if(id==='history')badge=String(LS.hist.length||'');if(id==='allmodels')badge=String(MODELS.length||'');elm.append(el('button',{class:id===CURRENT?'active':'',onclick:()=>go(id)},el('span',{class:'ic'},ic),el('span',{},label),badge?el('span',{class:'badge'},badge):null));});}
function renderNav(){navGroup($('#navCreate'),NAV.create);navGroup($('#navPower'),NAV.power);navGroup($('#navAssets'),NAV.assets);navGroup($('#navSys'),NAV.sys);
  const ok=!!LS.key;$('#connDot').className='dot'+(ok?' on':'');$('#connTxt').textContent=ok?'Connected':'Not connected';
  $('#brandName').firstChild.textContent=BRAND.name;$('#brandSub').textContent=BRAND.sub;$('#brandMark').textContent=BRAND.mark;document.title=BRAND.name+' — '+BRAND.sub;}
function header(t,d){return el('div',{class:'head'},el('h1',{},t),el('p',{},d));}
function workflowBar(steps){const w=el('div',{class:'workflow'});steps.forEach((s,i)=>w.append(el('div',{class:'step'},el('span',{class:'n'},String(i+1)),el('b',{},s[0]),'· '+s[1])));return w;}
function keyNote(v){if(!LS.key)v.append(el('div',{class:'note',html:'Not connected yet — add your engine key in <b>Settings</b> to generate. Every form already reflects the real workflow.'}));}
function assetsPanel(){const box=el('div',{});F.audio_ids=[];F.character_ids=[];box.append(picker('Voice','voices','audio_ids','audioId',3));box.append(picker('Character','characters','character_ids','charId',3));return box;}
function picker(label,libKey,fKey,idField,max){const lib=LS.lib[libKey]||[];const w=el('div',{class:'field'});w.append(el('label',{},`${label} `,el('span',{class:'hint',html:`(max ${max})`})));F[fKey]=F[fKey]||[];if(!lib.length){w.append(el('div',{class:'empty'},`None yet — create in ${libKey==='voices'?'Avatars → Voice':'Avatars'}.`));return w;}const list=el('div',{class:'picker'});lib.forEach(it=>{const row=el('div',{class:'pick'});const cb=el('input',{type:'checkbox'});cb.onchange=()=>{if(cb.checked){if(F[fKey].length>=max){cb.checked=false;return toast('Max '+max);}F[fKey].push(it[idField]);row.classList.add('sel');}else{F[fKey]=F[fKey].filter(x=>x!==it[idField]);row.classList.remove('sel');}};row.append(cb,it.thumb?el('img',{src:it.thumb,style:'width:26px;height:26px;border-radius:6px;object-fit:cover'}):document.createTextNode(libKey==='voices'?'🎙️':'🧑'),el('span',{},it.name||'(unnamed)'),el('span',{class:'id'},it[idField]||''));list.append(row);});w.append(list);return w;}

/* split layout: left inputs card, right output+button */
function splitLayout(v,leftBuild,onGen,priceTxt,genLabel){const grid=el('div',{class:'grid'});const left=el('div',{class:'card'});left.append(el('h3',{},'Inputs'));leftBuild(left);
  const right=el('div',{});const outCard=el('div',{class:'card'});outCard.append(el('h3',{},'Output'));const out=el('div',{class:'out'},'Result appears here');outCard.append(out);const status=el('div',{class:'price'});outCard.append(status);
  const btn=el('button',{class:'btn',onclick:()=>onGen(out,status,btn)},genLabel||'✨ Generate');const act=el('div',{class:'card'});act.append(btn);if(priceTxt)act.append(el('div',{class:'price'},priceTxt));
  right.append(act,outCard);grid.append(left,right);v.append(grid);return{out,status,btn};}
function renderMedia(out,res,kind){const url=(res.outputs&&res.outputs[0])||res.url||'';const u=String(url).toLowerCase();if(/\.(mp4|mov|webm)(\?|$)/.test(u))kind='video';else if(/\.(png|jpe?g|webp|gif)(\?|$)/.test(u))kind='image';else if(/\.(mp3|wav|m4a|ogg|flac)(\?|$)/.test(u))kind='audio';
  out.innerHTML='';if(!url){out.append(el('div',{},'No media in response.'),el('pre',{style:'font-size:11px;text-align:left;overflow:auto;max-height:160px'},JSON.stringify(res).slice(0,1000)));return;}
  if(kind==='image')out.append(el('img',{src:url}));else if(kind==='audio')out.append(el('audio',{src:url,controls:'1'}));else out.append(el('video',{src:url,controls:'1',autoplay:'1',loop:'1',muted:'1'}));
  out.append(el('div',{class:'price'},el('a',{href:url,target:'_blank'},'⬇ open / download')));}
async function runJob(endpoint,payload,name,out,status,btn,kind){if(!LS.key)return toast('Connect in Settings','err');
  try{btn.disabled=true;out.innerHTML='';status.innerHTML='<span class="pill run">● submitting</span>';const sub=await apiSubmit(endpoint,payload);let res=sub;
    if(sub.request_id){addHistory({id:sub.request_id,skill:name,t:Date.now(),status:'processing'});res=await poll(sub.request_id,st=>status.innerHTML=`<span class="pill run">● ${st}</span> <code>${sub.request_id}</code>`);updHistory(sub.request_id,'completed');}
    renderMedia(out,res,kind);status.innerHTML='<span class="pill ok">● completed</span>';toast('Done!','ok');return res;

const RE_IMG=/(image|img|face|photo|portrait|ref|mask|logo|style)/i,RE_VID=/video|clip/i,RE_AUD=/audio|music|voice|speech|song|track/i;
function fieldKind(f){const n=(f.name||'').toLowerCase(),t=(f.type||'string');if(f.enum&&f.enum.length)return'enum';if(t==='boolean'||t==='bool')return'bool';if(t==='int'||t==='integer'||t==='number'||t==='float')return'num';if(t==='array')return'array';if(/prompt|description|text|caption|lyrics|message|negative/.test(n))return'textarea';if(RE_VID.test(n)&&!/prompt/.test(n))return'vid';if(RE_AUD.test(n)&&/url|file|audio|music|voice|track/.test(n))return'aud';if(RE_IMG.test(n)&&!/prompt/.test(n))return'img';if(/url/.test(n))return'img';return'text';}
function buildAutoForm(model,col){model.fields.forEach(f=>{const k=f.name,kind=fieldKind(f),lbl=pretty(k),hint=f.desc?String(f.desc).slice(0,120):null;

  else if(kind==='bool'){F[k]=!!f.default;const cb=el('input',{type:'checkbox'});if(f.default)cb.checked=true;cb.onchange=()=>F[k]=cb.checked;col.append(wrap(null,el('label',{class:'toggle'},cb,lbl),hint,false));}
  else if(kind==='num'){F[k]=f.default!=null?f.default:'';const n=el('input',{type:'number'});if(f.default!=null)n.value=f.default;n.oninput=()=>F[k]=n.value;col.append(wrap(lbl,n,hint,f.req));}
  else if(kind==='textarea')col.append(fText(lbl,k,hint||'',f.req,true));
  else if(kind==='vid')col.append(fUrl(lbl,k,'video/*',f.req,hint));
  else if(kind==='aud')col.append(fUrl(lbl,k,'audio/*',f.req,hint));
  else if(kind==='img')col.append(fUrl(lbl,k,'image/*',f.req,hint));
  else if(kind==='array'){F[k]=[];const ta=el('textarea',{placeholder:'one URL per line'});ta.oninput=()=>F[k]=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);const file=el('input',{type:'file',style:'display:none'});const up=el('button',{onclick:async e=>{e.preventDefault();if(!LS.key)return toast('Connect first','err');file.click();}},'⬆ upload + add');file.onchange=async()=>{try{const u=await apiUpload(file.files[0]);ta.value=(ta.value?ta.value+'\n':'')+u;F[k]=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);toast('Added','ok');}catch(e){toast(e.message,'err');}};col.append(wrap(lbl,el('div',{},ta,el('div',{class:'seg'},up),file),hint,f.req));}
  else col.append(fText(lbl,k,hint||'',f.req,false));});}
function gatherCatalog(model){const p={};for(const f of model.fields){const k=f.name,kind=fieldKind(f);let v=F[k];if(kind==='num'){if(v!==''&&v!=null&&!Number.isNaN(Number(v)))p[k]=Number(v);else if(f.req&&f.default!=null)p[k]=f.default;}else if(kind==='bool'){if(v||f.req)p[k]=!!v;}else if(kind==='array'){if(Array.isArray(v)&&v.length)p[k]=v;}else{if(v!=null&&v!=='')p[k]=v;}if(f.req&&(p[k]==null||p[k]===''||(Array.isArray(p[k])&&!p[k].length)))throw new Error('Required: '+pretty(k));}return p;}

  a.forEach(h=>{const cls=h.status==='completed'?'ok':h.status==='failed'?'err':'run';const row=el('div',{class:'h'});row.append(el('span',{class:'pill '+cls},'● '+h.status),el('b',{},h.skill),el('code',{},h.id));if(h.url)row.append(el('a',{href:h.url,target:'_blank'},'open'));else if(h.status!=='failed')row.append(el('a',{href:'#',onclick:async e=>{e.preventDefault();try{const r=await apiResult(h.id);if(r.status==='completed'){updHistory(h.id,'completed',r.outputs&&r.outputs[0]);go('history');}else toast('Still '+(r.status||'processing'));}catch(err){toast(err.message,'err');}}},'re-poll'));row.append(el('span',{class:'t'},new Date(h.t).toLocaleString()));card.append(row);});v.append(card);}
function viewSettings(v){v.append(header('Settings ⚙️','Your engine key is stored only in this browser (localStorage).'));
  const card=el('div',{class:'card',style:'max-width:560px'});const key=el('input',{type:'text',placeholder:'your engine key',value:LS.key});const base=el('input',{type:'text',value:LS.base});const bn=el('input',{type:'text',value:BRAND.name});const bs=el('input',{type:'text',value:BRAND.sub});
  card.append(wrap('Engine API key',key,'Sent privately from your browser to the engine.',true));card.append(wrap('Engine base URL',base,'On a CORS error, point this at your own proxy.'));
  card.append(el('button',{class:'btn',onclick:()=>{LS.key=key.value.trim();LS.base=base.value.trim()||'https://api.muapi.ai/api/v1';renderNav();toast('Saved','ok');}},'Save connection'));
  v.append(card);
  const brandCard=el('div',{class:'card',style:'max-width:560px;margin-top:18px'});brandCard.append(el('h3',{},'Brand'));brandCard.append(wrap('Product name',bn));brandCard.append(wrap('Tagline',bs));brandCard.append(el('button',{class:'btn ghost',onclick:()=>{BRAND.name=bn.value||BRAND.name;BRAND.sub=bs.value||BRAND.sub;renderNav();toast('Brand updated (this session) — edit the BRAND line in the file to persist','ok');}},'Preview brand'));v.append(brandCard);
  const tools=el('div',{class:'card',style:'max-width:560px;margin-top:18px'});tools.append(el('h3',{},'Data'));tools.append(el('button',{class:'btn ghost',onclick:()=>{if(confirm('Clear Library + History?')){localStorage.removeItem('nova_lib');localStorage.removeItem('nova_hist');renderNav();go('settings');toast('Cleared');}}},'Clear Library & History'));v.append(tools);}

/* ===== boot ===== */
async function boot(){renderNav();go('video');try{const r=await fetch('./models.json');MODELS=await r.json();MODELS_BY_CAT={};MODELS.forEach(m=>{(MODELS_BY_CAT[m.category]=MODELS_BY_CAT[m.category]||[]).push(m);});renderNav();}catch(e){console.warn('models.json not loaded',e);}}
boot();
</script>
