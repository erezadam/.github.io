<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gemini Omni Studio — MuAPI Dashboard</title>
<style>
  :root{
    --bg:#0b0d12; --panel:#141821; --panel2:#1b212d; --line:#262d3a;
    --txt:#e6e9ef; --muted:#8b94a7; --accent:#6c8cff; --accent2:#9a6cff;
    --ok:#37d399; --warn:#ffb454; --err:#ff5d6c; --chip:#222a38;
    --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#16203a 0%,var(--bg) 55%);color:var(--txt);min-height:100vh}
  a{color:var(--accent)}
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  /* Sidebar */
  .side{background:var(--panel);border-right:1px solid var(--line);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;margin:4px 6px 18px}
  .brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:16px}
  .navlabel{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 8px 6px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--muted);
    padding:9px 10px;border-radius:10px;cursor:pointer;font-size:14px}
  .nav button:hover{background:var(--panel2);color:var(--txt)}
  .nav button.active{background:linear-gradient(90deg,rgba(108,140,255,.18),rgba(154,108,255,.10));color:#fff}
  .nav button .ic{width:20px;text-align:center}
  .nav button .badge{margin-left:auto;font-size:10px;background:var(--chip);color:var(--muted);padding:2px 7px;border-radius:20px}
  .status{margin:16px 6px 0;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--err)}
  .dot.on{background:var(--ok)}
  /* Main */
  .main{padding:26px 30px 60px;max-width:1100px}
  .head{margin-bottom:20px}
  .head h1{margin:0 0 4px;font-size:24px}
  .head p{margin:0;color:var(--muted);font-size:14px}
  .workflow{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 22px}
  .step{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
    padding:8px 12px;border-radius:30px;font-size:12.5px;color:var(--muted)}
  .step b{color:var(--txt);font-weight:600}
  .step .n{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start}
  @media(max-width:900px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .card h3{margin:0 0 14px;font-size:15px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;margin-bottom:6px;color:var(--txt)}
  .field .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
  .req{color:var(--err)}
  input[type=text],input[type=number],textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
  textarea{min-height:96px;resize:vertical;line-height:1.5}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:12px}.row>*{flex:1}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px}
  .seg button.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:18px;text-align:center;color:var(--muted);cursor:pointer;font-size:13px;background:var(--panel2)}
  .drop.over{border-color:var(--accent);color:var(--txt)}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .thumb{position:relative;width:64px;height:64px;border-radius:9px;overflow:hidden;border:1px solid var(--line);background:#000}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
  .thumb .x{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;width:18px;height:18px}
  .picker{display:flex;flex-direction:column;gap:6px;max-height:160px;overflow:auto}
  .pick{display:flex;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;cursor:pointer}
  .pick.sel{border-color:var(--accent)}
  .pick .id{margin-left:auto;font-size:10.5px;color:var(--muted);font-family:ui-monospace,monospace}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;padding:12px 18px;border-radius:11px;
    font-size:14px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.ghost{background:var(--panel2);border:1px solid var(--line)}
  .out{min-height:120px;display:grid;place-items:center;text-align:center;color:var(--muted);font-size:13px}
  .out video,.out img{max-width:100%;border-radius:10px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;padding:4px 10px;border-radius:20px;background:var(--chip);color:var(--muted)}
  .pill.run{color:var(--warn)} .pill.ok{color:var(--ok)} .pill.err{color:var(--err)}
  .price{font-size:12px;color:var(--muted);margin-top:8px;text-align:center}
  .libitem{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px}
  .libitem img{width:40px;height:40px;border-radius:8px;object-fit:cover}
  .libitem .meta{min-width:0}
  .libitem .meta b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .libitem .meta small{color:var(--muted);font-family:ui-monospace,monospace;font-size:10.5px}
  .libitem .copy{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);border-radius:7px;cursor:pointer;padding:5px 9px;font-size:11px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);padding:11px 18px;border-radius:11px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .toast.err{border-color:var(--err)} .toast.ok{border-color:var(--ok)}
  .note{background:rgba(255,180,84,.08);border:1px solid rgba(255,180,84,.3);color:#ffd9a8;font-size:12.5px;padding:11px 13px;border-radius:10px;margin-bottom:18px}
  code{background:var(--panel2);padding:2px 6px;border-radius:6px;font-size:12px}
  .hist{font-size:12.5px}
  .hist .h{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
  .hist .h:last-child{border:none}
  .hist .h .t{color:var(--muted);margin-left:auto;font-size:11px}
  kbd{background:var(--panel2);border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:11px}
</style>
</head>
<body>
<div class="app">
  <!-- ===== Sidebar ===== -->
  <aside class="side">
    <div class="brand"><span class="logo">◑</span> Omni Studio</div>
    <div class="navlabel">Generate</div>
    <nav class="nav" id="navGen"></nav>
    <div class="navlabel">Assets</div>
    <nav class="nav" id="navAssets"></nav>
    <div class="navlabel">System</div>
    <nav class="nav" id="navSys"></nav>
    <div class="status"><span class="dot" id="connDot"></span><span id="connTxt">No API key</span></div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main" id="view"></main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Gemini Omni Studio — single-file dashboard for MuAPI
   Works once you set your API key (Settings). Calls muapi
   directly: POST endpoint -> request_id -> poll result.
   ============================================================ */

const LS = {
  get key(){return localStorage.getItem('omni_key')||''},
  set key(v){localStorage.setItem('omni_key',v)},
  get base(){return localStorage.getItem('omni_base')||'https://api.muapi.ai/api/v1'},
  set base(v){localStorage.setItem('omni_base',v)},
  get lib(){try{return JSON.parse(localStorage.getItem('omni_lib')||'{"voices":[],"characters":[]}')}catch(e){return{voices:[],characters:[]}}},
  set lib(v){localStorage.setItem('omni_lib',JSON.stringify(v))},
  get hist(){try{return JSON.parse(localStorage.getItem('omni_hist')||'[]')}catch(e){return[]}},
  set hist(v){localStorage.setItem('omni_hist',JSON.stringify(v.slice(0,40)))}
};

const VOICES = ["achernar","achird","algenib","algieba","alnilam","aoede","autonoe","callirrhoe","charon","despina","enceladus","erinome","fenrir","gacrux","iapetus","korel","aomedeia","leda","orus","puck","pulcherrima","rasalgethi","sadachbia","sadaltager","schedar","sulafat","umbriel","vindemiatrix","zephyr","zubenelgenubi"];

/* ---- Skill / workflow definitions (the "thinking", encoded) ---- */
const SKILLS = {
  t2v:{
    nav:'Text → Video', icon:'🎬', badge:'$1.50+',
    title:'Text to Video', endpoint:'gemini-omni-text-to-video', output:'video',
    desc:'One prompt → cinematic video with synchronized dialogue, ambient sound and music in a single pass.',
    workflow:[['Write a rich prompt','visuals + audio together'],['(optional) attach voice / character','for consistency'],['Pick duration / resolution','then Generate'],['Poll until ready','video + audio out']],
    fields:['prompt','media_opts','assets']
  },
  i2v:{
    nav:'Image → Video', icon:'🖼️', badge:'$1.50+',
    title:'Image to Video', endpoint:'gemini-omni-image-to-video', output:'video',
    desc:'Animate 1–5 reference images with a prompt. Subject identity preserved across frames, audio generated natively.',
    workflow:[['Upload 1–5 reference images','subjects / style'],['Describe the motion & scene','+ audio cues'],['Pick options','then Generate'],['Poll until ready','animated video']],
    fields:['images','prompt','media_opts','assets']
  },
  edit:{
    nav:'Video Edit', icon:'✂️', badge:'$2.40',
    title:'Video Edit', endpoint:'gemini-omni-video-edit', output:'video',
    desc:'Restyle, relight, swap subjects or rewrite dialogue from a source clip — motion & timing preserved.',
    workflow:[['Upload a source clip','≤100MB / 30s'],['Trim the edit window','≤10s span'],['Describe the edit','what changes / stays'],['Generate & poll','edited video']],
    fields:['video','trim','prompt','images_opt','media_opts','assets']
  },
  audio:{
    nav:'Voice Profile', icon:'🎙️', badge:'Free',
    title:'Voice Profile', endpoint:'gemini-omni-audio', output:'voice',
    desc:'Create a reusable voice from 30 presets. Returns an audio_id you attach to any video for a consistent voice.',
    workflow:[['Pick a base voice','30 presets'],['Name + describe it','timbre / style'],['Create','→ audio_id saved to Library'],['Reuse','in Text/Image/Edit']],
    fields:['voiceform']
  },
  character:{
    nav:'Character', icon:'🧑‍🎤', badge:'Free',
    title:'Character Profile', endpoint:'gemini-omni-character', output:'character',
    desc:'Create a reusable character from 1 image + a description. Returns a character_id for identity-consistent video.',
    workflow:[['Upload 1 reference image','the visual anchor'],['Describe the character','+ optional voice'],['Create','→ character_id saved to Library'],['Reuse','via Character picker']],
    fields:['charform']
  }
};

/* ---------- tiny helpers ---------- */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,a={},...c)=>{const e=document.createElement(t);for(const k in a){if(k==='class')e.className=a[k];else if(k==='html')e.innerHTML=a[k];else if(k.startsWith('on'))e.addEventListener(k.slice(2),a[k]);else e.setAttribute(k,a[k])}c.flat().forEach(x=>e.append(x.nodeType?x:document.createTextNode(x)));return e};
const uid=()=>Math.random().toString(36).slice(2,10);
function toast(msg,type=''){const t=$('#toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2600);}
function headers(){return{'x-api-key':LS.key,'Content-Type':'application/json'};}

/* ---------- API layer ---------- */
async function apiUpload(file){
  const fd=new FormData();fd.append('file',file);
  const r=await fetch(`${LS.base}/upload_file`,{method:'POST',headers:{'x-api-key':LS.key},body:fd});
  const j=await r.json().catch(()=>({}));
  if(!j.url) throw new Error(j.error||j.detail||'Upload failed');
  return j.url;
}
async function apiSubmit(endpoint,payload){
  const r=await fetch(`${LS.base}/${endpoint}`,{method:'POST',headers:headers(),body:JSON.stringify(payload)});
  const j=await r.json().catch(()=>({}));
  if(j.error||j.detail) throw new Error(j.error||j.detail);
  return j;
}
async function apiResult(id){
  const r=await fetch(`${LS.base}/predictions/${id}/result`,{headers:headers()});
  return r.json();
}
async function poll(id,onTick){
  for(let i=0;i<180;i++){
    await new Promise(r=>setTimeout(r,4000));
    const j=await apiResult(id);
    onTick&&onTick(j.status||'processing');
    if(j.status==='completed')return j;
    if(j.status==='failed')throw new Error((j.output&&j.output.error)||j.error||'failed');
  }
  throw new Error('Timed out — re-poll from History');
}

/* ---------- state for the active form ---------- */
let F={}; // current form working values

/* ---------- field renderers ---------- */
function fSeg(label,key,opts,def,hint){
  F[key]=def;
  const seg=el('div',{class:'seg'});
  opts.forEach(o=>{const b=el('button',{class:o===def?'sel':'',onclick:()=>{F[key]=o;[...seg.children].forEach(c=>c.classList.toggle('sel',c.textContent===String(o)));}},String(o));seg.append(b);});
  return wrap(label,seg,hint,false);
}
function wrap(label,node,hint,req){
  const f=el('div',{class:'field'});
  if(label){const l=el('label',{},label);if(req)l.append(el('span',{class:'req'},' *'));f.append(l);}
  f.append(node);if(hint)f.append(el('div',{class:'hint',html:hint}));return f;
}
function fText(label,key,ph,req,area){
  const n=area?el('textarea',{placeholder:ph}):el('input',{type:'text',placeholder:ph});
  n.addEventListener('input',()=>F[key]=n.value);F[key]='';
  return wrap(label,n,null,req);
}
function fNum(label,key,ph){const n=el('input',{type:'number',placeholder:ph||''});n.addEventListener('input',()=>F[key]=n.value);return wrap(label,n);}
function fSelect(label,key,opts,req){
  const s=el('select');s.append(el('option',{value:''},'— choose —'));
  opts.forEach(o=>s.append(el('option',{value:o},o)));
  s.addEventListener('change',()=>F[key]=s.value);return wrap(label,s,null,req);
}
/* file uploader (returns CDN urls on generate; previews locally) */
function fFiles(label,key,multi,hint,accept){
  F[key]=[]; // array of {file,url}
  const drop=el('div',{class:'drop'},multi?'Drag & drop or click — images':'Click to choose');
  const thumbs=el('div',{class:'thumbs'});
  const input=el('input',{type:'file',accept:accept||'image/*',style:'display:none',...(multi?{multiple:'multiple'}:{})});
  const add=files=>{for(const f of files){if(!multi)F[key]=[];F[key].push({file:f});if(!multi)thumbs.innerHTML='';
      const url=URL.createObjectURL(f);const isV=f.type.startsWith('video');
      const t=el('div',{class:'thumb'}, isV?el('video',{src:url,muted:'1'}):el('img',{src:url}));
      const rec=F[key][F[key].length-1];
      t.append(el('button',{class:'x',onclick:()=>{F[key]=F[key].filter(r=>r!==rec);t.remove();}},'×'));
      thumbs.append(t);if(!multi)break;}};
  drop.onclick=()=>input.click();
  input.onchange=()=>add(input.files);
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
  drop.ondragleave=()=>drop.classList.remove('over');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');add(e.dataTransfer.files);};
  return wrap(label,el('div',{},drop,input,thumbs),hint,!hint);
}
/* asset pickers (voices + characters from Library) */
function fAssets(){
  const box=el('div',{});
  F.audio_ids=[];F.character_ids=[];
  box.append(picker('Voice profiles','voices','audio_ids','audioId',3));
  box.append(picker('Characters','characters','character_ids','charId',3));
  return box;
}
function picker(label,libKey,fKey,idField,max){
  const lib=LS.lib[libKey]||[];
  const wrapEl=el('div',{class:'field'});
  wrapEl.append(el('label',{},`${label} `,el('span',{class:'hint',html:`(max ${max})`})));
  if(!lib.length){wrapEl.append(el('div',{class:'empty'},`None yet — create in the ${libKey==='voices'?'Voice Profile':'Character'} tab.`));return wrapEl;}
  const list=el('div',{class:'picker'});
  lib.forEach(it=>{
    const row=el('div',{class:'pick'});
    const cb=el('input',{type:'checkbox'});
    cb.onchange=()=>{if(cb.checked){if(F[fKey].length>=max){cb.checked=false;toast('Max '+max);return;}F[fKey].push(it[idField]);row.classList.add('sel');}else{F[fKey]=F[fKey].filter(x=>x!==it[idField]);row.classList.remove('sel');}};
    row.append(cb, it.thumb?el('img',{src:it.thumb,style:'width:26px;height:26px;border-radius:6px;object-fit:cover'}):document.createTextNode(libKey==='voices'?'🎙️':'🧑'), el('span',{},it.name||'(unnamed)'), el('span',{class:'id'},it[idField]||''));
    list.append(row);
  });
  wrapEl.append(list);return wrapEl;
}

/* ---------- build a generation form for a video skill ---------- */
function buildFields(skill,col){
  const f=skill.fields;
  if(f.includes('images')) col.append(fFiles('Reference images (1–5)','images',true,null));
  if(f.includes('video')) col.append(fFiles('Source video','video',false,'Max 100MB / 30s. mp4 or mov.','video/*'));
  if(f.includes('trim')){const r=el('div',{class:'row'});F.trim_start='';F.trim_end='';
    const a=el('input',{type:'number',placeholder:'start s'});a.oninput=()=>F.trim_start=a.value;
    const b=el('input',{type:'number',placeholder:'end s'});b.oninput=()=>F.trim_end=b.value;
    r.append(wrap('Trim start',a),wrap('Trim end',b));col.append(r);}
  if(f.includes('prompt')) col.append(fText(skill.id==='edit'?'Edit instruction':'Prompt','prompt',
      skill.id==='edit'?'Restyle as Studio Ghibli; keep camera motion & timing':'Describe scene, action, camera, dialogue and ambient sound…',true,true));
  if(f.includes('images_opt')) col.append(fFiles('Reference images (optional)','images',true,'Used as visual refs for the edit.'));
  if(f.includes('media_opts')){
    col.append(fSeg('Duration (seconds)','duration',[4,6,8,10],8));
    const r=el('div',{class:'row'});
    r.append(fSeg('Resolution','resolution',['720p','1080p','4k'],'1080p'));
    r.append(fSeg('Aspect','aspect_ratio',['16:9','9:16'],'16:9'));
    col.append(r);
    col.append(fText('Seed (optional)','seed','Leave empty for random'));
  }
}

/* ---------- payload builders ---------- */
async function gatherVideoPayload(skill){
  const p={prompt:F.prompt||'',duration:Number(F.duration),resolution:F.resolution,aspect_ratio:F.aspect_ratio};
  if(!p.prompt) throw new Error('Prompt is required');
  if(F.seed) p.seed=Number(F.seed);
  if(F.audio_ids&&F.audio_ids.length) p.audio_ids=F.audio_ids;
  if(F.character_ids&&F.character_ids.length) p.character_ids=F.character_ids;
  // uploads
  if(skill.id==='i2v'||skill.id==='edit'){
    const imgs=(F.images||[]);
    if(skill.id==='i2v'&&!imgs.length) throw new Error('Add 1–5 reference images');
    if(imgs.length){p.image_urls=[];for(const it of imgs){p.image_urls.push(it.url||(it.url=await apiUpload(it.file)));}}
  }
  if(skill.id==='edit'){
    const v=(F.video||[])[0];
    if(v) p.video_url=v.url||(v.url=await apiUpload(v.file));
    if(!v&&!(p.image_urls&&p.image_urls.length)) throw new Error('Add a source video (or reference images)');
    if(F.trim_start!=='') p.trim_start=Number(F.trim_start);
    if(F.trim_end!=='') p.trim_end=Number(F.trim_end);
  }
  return p;
}

/* ============================================================
   VIEWS
   ============================================================ */
let CURRENT='t2v';
function go(id){CURRENT=id;renderNav();
  if(id==='library')return viewLibrary();
  if(id==='history')return viewHistory();
  if(id==='settings')return viewSettings();
  return viewSkill(id);
}
function renderNav(){
  const gen=$('#navGen');gen.innerHTML='';
  Object.entries(SKILLS).forEach(([id,s])=>{
    gen.append(el('button',{class:id===CURRENT?'active':'',onclick:()=>go(id)},
      el('span',{class:'ic'},s.icon),el('span',{},s.nav),el('span',{class:'badge'},s.badge)));
  });
  const as=$('#navAssets');as.innerHTML='';
  const lib=LS.lib;
  as.append(el('button',{class:CURRENT==='library'?'active':'',onclick:()=>go('library')},
    el('span',{class:'ic'},'📚'),el('span',{},'Library'),el('span',{class:'badge'},String((lib.voices.length+lib.characters.length)||''))));
  as.append(el('button',{class:CURRENT==='history'?'active':'',onclick:()=>go('history')},
    el('span',{class:'ic'},'🕘'),el('span',{},'History'),el('span',{class:'badge'},String(LS.hist.length||''))));
  const sys=$('#navSys');sys.innerHTML='';
  sys.append(el('button',{class:CURRENT==='settings'?'active':'',onclick:()=>go('settings')},el('span',{class:'ic'},'⚙️'),el('span',{},'Settings')));
  // connection
  const ok=!!LS.key;$('#connDot').className='dot'+(ok?' on':'');$('#connTxt').textContent=ok?'API key set':'No API key';
}

function header(title,desc){return el('div',{class:'head'},el('h1',{},title),el('p',{},desc));}
function workflowBar(steps){const w=el('div',{class:'workflow'});steps.forEach((s,i)=>{w.append(el('div',{class:'step'},el('span',{class:'n'},String(i+1)),el('b',{},s[0]),'· '+s[1]));});return w;}

function viewSkill(id){
  const s={...SKILLS[id],id:id==='t2v'?'t2v':id==='i2v'?'i2v':id};s.id=id; // keep id
  F={};const v=$('#view');v.innerHTML='';
  v.append(header(s.title+'  '+s.icon,s.desc));
  if(!LS.key) v.append(el('div',{class:'note',html:'No API key yet. Add it in <b>Settings</b> to enable generation. The form below already reflects the exact workflow for this skill.'}));
  v.append(workflowBar(s.workflow));

  if(id==='audio')return formVoice(v);
  if(id==='character')return formCharacter(v);

  const grid=el('div',{class:'grid'});
  const left=el('div',{class:'card'});left.append(el('h3',{},'Inputs'));
  buildFields(s,left);
  if(s.fields.includes('assets'))left.append(fAssets());
  const right=el('div',{});
  const outCard=el('div',{class:'card'});outCard.append(el('h3',{},'Output'));
  const out=el('div',{class:'out'},'Result appears here');outCard.append(out);
  const status=el('div',{class:'price'},'');outCard.append(status);
  const genBtn=el('button',{class:'btn',onclick:()=>runVideo(s,out,status,genBtn)},'✨ Generate');
  const actions=el('div',{class:'card'});actions.append(genBtn);
  actions.append(el('div',{class:'price'},priceLine(id)));
  right.append(actions,outCard);
  grid.append(left,right);v.append(grid);
}
function priceLine(id){return id==='edit'?'≈ $2.40 (720p/1080p) · $3.60 (4K)':'≈ $1.50–$3.00 by duration & resolution · audio included';}

async function runVideo(skill,out,status,btn){
  if(!LS.key)return toast('Set your API key in Settings','err');
  let payload;
  try{out.innerHTML='';status.innerHTML='<span class="pill run">● preparing</span>';btn.disabled=true;
    payload=await gatherVideoPayload(skill);
  }catch(e){status.innerHTML='';btn.disabled=false;return toast(e.message,'err');}
  try{
    status.innerHTML='<span class="pill run">● uploading & submitting</span>';
    const sub=await apiSubmit(skill.endpoint,payload);
    const id=sub.request_id;if(!id)throw new Error('No request_id returned');
    addHistory({id,skill:skill.title,endpoint:skill.endpoint,t:Date.now(),status:'processing'});
    status.innerHTML=`<span class="pill run">● processing</span> <code>${id}</code>`;
    const res=await poll(id,st=>status.innerHTML=`<span class="pill run">● ${st}</span> <code>${id}</code>`);
    const url=(res.outputs&&res.outputs[0]);
    out.innerHTML='';out.append(el('video',{src:url,controls:'1',autoplay:'1',loop:'1',muted:'1'}));
    out.append(el('div',{class:'price'},el('a',{href:url,target:'_blank'},'⬇ open / download')));
    status.innerHTML='<span class="pill ok">● completed</span>';
    updHistory(id,'completed',url);toast('Done!','ok');
  }catch(e){status.innerHTML='<span class="pill err">● '+e.message+'</span>';toast(e.message,'err');}
  finally{btn.disabled=false;}
}

/* ----- Voice profile form ----- */
function formVoice(v){
  const grid=el('div',{class:'grid'});
  const left=el('div',{class:'card'});left.append(el('h3',{},'New voice profile'));
  left.append(fSelect('Base voice (30 presets)','base_voice',VOICES,true));
  left.append(fText('Profile name','profile_name','e.g. Narrator',true));
  left.append(fText('Voice description','voice_description','Warm, calm, slight British accent, gentle pacing',false,true));
  left.append(fText('Example dialogue','example_dialogue','Hello, I am here to guide you (≤120 chars)'));
  const right=el('div',{});const outCard=el('div',{class:'card'});outCard.append(el('h3',{},'Result'));
  const out=el('div',{class:'out'},'audio_id appears here & is saved to Library');outCard.append(out);
  const status=el('div',{class:'price'});outCard.append(status);
  const btn=el('button',{class:'btn',onclick:async()=>{
    if(!LS.key)return toast('Set API key','err');
    if(!F.base_voice)return toast('Choose a base voice','err');
    if(!F.profile_name)return toast('Name required','err');
    btn.disabled=true;status.innerHTML='<span class="pill run">● creating</span>';
    try{const p={base_voice:F.base_voice,profile_name:F.profile_name};
      if(F.voice_description)p.voice_description=F.voice_description;
      if(F.example_dialogue)p.example_dialogue=F.example_dialogue;
      let r=await apiSubmit('gemini-omni-audio',p);
      let aid=r.audio_id; if(!aid&&r.request_id){const res=await poll(r.request_id,st=>status.innerHTML='<span class="pill run">● '+st+'</span>');aid=res.audio_id||(res.outputs&&res.outputs[0]);}
      if(!aid)throw new Error('No audio_id returned');
      const lib=LS.lib;lib.voices.push({audioId:aid,name:F.profile_name,base:F.base_voice});LS.lib=lib;
      out.innerHTML='';out.append(el('div',{},'🎙️ ',el('b',{},F.profile_name)),el('div',{class:'price'},el('code',{},aid)));
      status.innerHTML='<span class="pill ok">● saved to Library</span>';renderNav();toast('Voice saved','ok');
    }catch(e){status.innerHTML='<span class="pill err">● '+e.message+'</span>';toast(e.message,'err');}
    finally{btn.disabled=false;}
  }},'🎙️ Create voice');
  const act=el('div',{class:'card'});act.append(btn);act.append(el('div',{class:'price'},'Free'));
  right.append(act,outCard);grid.append(left,right);v.append(grid);
}

/* ----- Character form ----- */
function formCharacter(v){
  F.images=[];
  const grid=el('div',{class:'grid'});
  const left=el('div',{class:'card'});left.append(el('h3',{},'New character'));
  left.append(fFiles('Reference image (exactly 1)','images',false,null));
  left.append(fText('Character description','descriptions','Young woman, short silver hair, dark trench coat, composed',true,true));
  left.append(fText('Character name','character_name','e.g. Aria'));
  left.append(picker('Attach voice profiles','voices','audio_ids','audioId',3));F.audio_ids=F.audio_ids||[];
  const right=el('div',{});const outCard=el('div',{class:'card'});outCard.append(el('h3',{},'Result'));
  const out=el('div',{class:'out'},'character_id + preview saved to Library');outCard.append(out);
  const status=el('div',{class:'price'});outCard.append(status);
  const btn=el('button',{class:'btn',onclick:async()=>{
    if(!LS.key)return toast('Set API key','err');
    if(!(F.images&&F.images.length))return toast('Add exactly 1 image','err');
    if(!F.descriptions)return toast('Description required','err');
    btn.disabled=true;status.innerHTML='<span class="pill run">● uploading</span>';
    try{const url=F.images[0].url||(F.images[0].url=await apiUpload(F.images[0].file));
      const p={descriptions:F.descriptions,images_list:[url]};
      if(F.character_name)p.character_name=F.character_name;
      if(F.audio_ids&&F.audio_ids.length)p.audio_ids=F.audio_ids;
      status.innerHTML='<span class="pill run">● creating</span>';
      let r=await apiSubmit('gemini-omni-character',p);
      let cid=r.character_id,img=(r.outputs&&r.outputs[0]);
      if(!cid&&r.request_id){const res=await poll(r.request_id,st=>status.innerHTML='<span class="pill run">● '+st+'</span>');cid=res.character_id;img=(res.outputs&&res.outputs[0])||img;}
      if(!cid)throw new Error('No character_id returned');
      const lib=LS.lib;lib.characters.push({charId:cid,name:F.character_name||'Character',thumb:img||url});LS.lib=lib;
      out.innerHTML='';out.append(el('img',{src:img||url,style:'max-height:150px'}),el('div',{},el('b',{},F.character_name||'Character')),el('div',{class:'price'},el('code',{},cid)));
      status.innerHTML='<span class="pill ok">● saved to Library</span>';renderNav();toast('Character saved','ok');
    }catch(e){status.innerHTML='<span class="pill err">● '+e.message+'</span>';toast(e.message,'err');}
    finally{btn.disabled=false;}
  }},'🧑‍🎤 Create character');
  const act=el('div',{class:'card'});act.append(btn);act.append(el('div',{class:'price'},'Free'));
  right.append(act,outCard);grid.append(left,right);v.append(grid);
}

/* ----- Library ----- */
function viewLibrary(){
  const v=$('#view');v.innerHTML='';v.append(header('Library 📚','Reusable voice profiles and characters. Their IDs auto-appear in the video pickers.'));
  const lib=LS.lib;const grid=el('div',{class:'grid'});
  const c1=el('div',{class:'card'});c1.append(el('h3',{},'🎙️ Voice profiles'));
  if(!lib.voices.length)c1.append(el('div',{class:'empty'},'None yet.'));
  lib.voices.forEach((it,i)=>c1.append(libItem('🎙️',it.name,it.audioId,()=>{lib.voices.splice(i,1);LS.lib=lib;viewLibrary();renderNav();})));
  const c2=el('div',{class:'card'});c2.append(el('h3',{},'🧑‍🎤 Characters'));
  if(!lib.characters.length)c2.append(el('div',{class:'empty'},'None yet.'));
  lib.characters.forEach((it,i)=>c2.append(libItem(it.thumb,it.name,it.charId,()=>{lib.characters.splice(i,1);LS.lib=lib;viewLibrary();renderNav();})));
  grid.append(c1,c2);v.append(grid);
}
function libItem(icon,name,id,onDel){
  const row=el('div',{class:'libitem'});
  row.append(icon&&icon.startsWith&&icon.startsWith('http')?el('img',{src:icon}):el('span',{style:'font-size:22px'},icon||'🎙️'));
  row.append(el('div',{class:'meta'},el('b',{},name||'(unnamed)'),el('small',{},id||'')));
  row.append(el('button',{class:'copy',onclick:()=>{navigator.clipboard.writeText(id);toast('ID copied','ok')}},'copy'));
  row.append(el('button',{class:'copy',onclick:onDel,style:'border-color:var(--err);color:var(--err)'},'del'));
  return row;
}

/* ----- History ----- */
function addHistory(h){const a=LS.hist;a.unshift(h);LS.hist=a;renderNav();}
function updHistory(id,status,url){const a=LS.hist;const h=a.find(x=>x.id===id);if(h){h.status=status;if(url)h.url=url;}LS.hist=a;}
function viewHistory(){
  const v=$('#view');v.innerHTML='';v.append(header('History 🕘','Recent jobs. Video generation can take minutes — re-poll any processing job.'));
  const card=el('div',{class:'card hist'});const a=LS.hist;
  if(!a.length)card.append(el('div',{class:'empty'},'No jobs yet.'));
  a.forEach(h=>{
    const cls=h.status==='completed'?'ok':h.status==='failed'?'err':'run';
    const row=el('div',{class:'h'});
    row.append(el('span',{class:'pill '+cls},'● '+h.status),el('b',{},h.skill),el('code',{},h.id));
    if(h.url)row.append(el('a',{href:h.url,target:'_blank'},'open'));
    else if(h.status!=='failed')row.append(el('a',{href:'#',onclick:async e=>{e.preventDefault();try{const r=await apiResult(h.id);if(r.status==='completed'){updHistory(h.id,'completed',r.outputs&&r.outputs[0]);viewHistory();}else toast('Still '+(r.status||'processing'));}catch(err){toast(err.message,'err');}}},'re-poll'));
    row.append(el('span',{class:'t'},new Date(h.t).toLocaleString()));
    card.append(row);
  });
  v.append(card);
}

/* ----- Settings ----- */
function viewSettings(){
  const v=$('#view');v.innerHTML='';v.append(header('Settings ⚙️','Your API key is stored only in this browser (localStorage). Get one at muapi.ai/dashboard.'));
  const card=el('div',{class:'card',style:'max-width:560px'});
  const key=el('input',{type:'text',placeholder:'mu_...',value:LS.key});
  const base=el('input',{type:'text',value:LS.base});
  card.append(wrap('MuAPI API key',key,'Header sent as <code>x-api-key</code>.',true));
  card.append(wrap('API base URL',base,'Default <code>https://api.muapi.ai/api/v1</code>. If the browser hits a CORS error, point this at your own proxy.'));
  card.append(el('button',{class:'btn',onclick:()=>{LS.key=key.value.trim();LS.base=base.value.trim()||'https://api.muapi.ai/api/v1';renderNav();toast('Saved','ok');}},'Save'));
  card.append(el('div',{class:'note',style:'margin-top:18px',html:'⚠️ <b>Gemini Omni endpoints go live when you wire up the Omni API.</b> This dashboard already sends the correct payloads (<code>gemini-omni-text-to-video</code>, <code>-image-to-video</code>, <code>-video-edit</code>, <code>-audio</code>, <code>-character</code>). Until the API is enabled on your key, calls will return an error — the UI/workflow is ready.'}));
  v.append(card);
  // data tools
  const tools=el('div',{class:'card',style:'max-width:560px;margin-top:18px'});
  tools.append(el('h3',{},'Data'));
  tools.append(el('button',{class:'btn ghost',onclick:()=>{if(confirm('Clear Library + History?')){localStorage.removeItem('omni_lib');localStorage.removeItem('omni_hist');renderNav();toast('Cleared');go('settings');}}},'Clear Library & History'));
  v.append(tools);
}

/* ---------- boot ---------- */
renderNav();go('t2v');
</script>
